experiment:
  name: fisherfaces_orl

data:
  dataset: orl
  data_dir: data
  train_image_ids: [1, 2, 3, 4, 5]
  test_image_ids: [6, 7, 8, 9, 10]

preprocessing:
  name: local_normalization
  params:
    window_size: 15

model:
  name: fisherfaces
  params:
    pca_components: auto
    lda_components: auto
    regularization: 1e-6
    eps: 1e-10

classifier:
  name: nearest_neighbor
  params:
    k: 1
    distance: euclidean

projection:
  drop_first_components: 0
  normalize: false

components:
  start: 1
  stop: auto
  step: 1

outputs:
  results_csv: results/experiments.csv
  save_figures: true
  figures_dir: outputs/figures
  save_error_curve: true
  save_mean_face: true
  save_components: true
  n_plot_components: 16
