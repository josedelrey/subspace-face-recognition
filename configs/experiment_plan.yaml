      params:
        pca_components: auto
        lda_components: auto
        regularization: 1.0e-6
        eps: 1.0e-10


  # ============================================================
  # 4. GLOBAL CLIPPED HISTOGRAM EQUALIZATION
  # ============================================================

  -
    experiment:
      name: eigenfaces_global_clipped_histeq_c2_euclidean_k1
    preprocessing:
      name: global_histogram_equalization
      params:
        clip_histogram: true
        clip_limit: 2.0
