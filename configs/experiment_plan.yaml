defaults:
  data:
    dataset: orl
    data_dir: data
    train_image_ids: [1, 2, 3, 4, 5]
    test_image_ids: [6, 7, 8, 9, 10]

  preprocessing: false

  classifier:
    name: nearest_neighbor
    params:
      k: 1
      distance: euclidean

  projection:
    drop_first_components: 0
    normalize: false
    normalize_eps: 1.0e-12

  components:
    start: 1
    stop: auto
    step: 1

  outputs:
    results_csv: results/final_full_experiment_plan.csv
    save_figures: true
    figures_dir: outputs/figures/final_full_plan
    save_error_curve: true
    save_mean_face: false
    save_components: false
    n_plot_components: 16


experiments:

  # ============================================================
  # 1. RAW BASELINES
  # ============================================================

  -
    experiment:
      name: direct_raw_euclidean_k1
    model:
      name: direct
      params:
        center: false

  -
    experiment:
      name: eigenfaces_raw_euclidean_k1
    model:
      name: eigenfaces
      params:
        eps: 1.0e-10

  -
    experiment:
      name: fisherfaces_raw_euclidean_k1
    model:
      name: fisherfaces
      params:
        pca_components: auto
        lda_components: auto
        regularization: 1.0e-6
        eps: 1.0e-10


  # ============================================================
  # 2. GLOBAL NORMALIZATION
  # ============================================================

  -
    experiment:
      name: direct_global_norm_euclidean_k1
    preprocessing:
      name: global_normalization
      params:
        eps: 1.0e-6
        output_type: float32
    model:
      name: direct
      params:
        center: false

  -
    experiment:
      name: eigenfaces_global_norm_euclidean_k1
    preprocessing:
      name: global_normalization
      params:
        eps: 1.0e-6
        output_type: float32
    model:
      name: eigenfaces
      params:
        eps: 1.0e-10

  -
    experiment:
      name: fisherfaces_global_norm_euclidean_k1
    preprocessing:
      name: global_normalization
      params:
        eps: 1.0e-6
        output_type: float32
    model:
      name: fisherfaces
      params:
        pca_components: auto
        lda_components: auto
        regularization: 1.0e-6
        eps: 1.0e-10


  # ============================================================
  # 3. GLOBAL HISTOGRAM EQUALIZATION
  # ============================================================

  -
    experiment:
      name: eigenfaces_global_histeq_euclidean_k1
    preprocessing:
      name: global_histogram_equalization
      params:
        clip_histogram: false
        output_type: float32
    model:
      name: eigenfaces
      params:
        eps: 1.0e-10

  -
    experiment:
      name: fisherfaces_global_histeq_euclidean_k1
    preprocessing:
      name: global_histogram_equalization
      params:
        clip_histogram: false
        output_type: float32
    model:
